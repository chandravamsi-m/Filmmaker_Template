<html lang="en" class="scroll-smooth dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premiere Approaching | Marcus Holloway</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/config.js"></script>
    
    <!-- External Styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body class="bg-dark text-white font-sans antialiased selection:bg-gold selection:text-dark overflow-x-hidden">
    <div class="grain-overlay"></div>

    <!-- Main Content -->
    <main class="min-h-screen flex items-center justify-center relative overflow-hidden px-6 py-24">
        <!-- Background Content -->
        <div class="absolute inset-0 z-0">
            <img src="../assets/images/cinematic-backdrop.webp" class="w-full h-full object-cover grayscale opacity-20 scale-105" alt="Cinematic Backdrop">
            <div class="absolute inset-0 bg-gradient-to-b from-dark/80 via-transparent to-dark"></div>
        </div>

        <div class="relative z-10 text-center max-w-4xl reveal-up">
            <!-- Branding for Standalone Page -->
            <div class="mb-20">
                <a href="index.html" class="site-logo text-3xl hover:text-gold text-white">
                    M/H <span class="site-logo__tagline hidden sm:inline">Filmmaking</span>
                </a>
            </div>

            <p class="font-mono text-gold text-xs uppercase tracking-[0.6em] mb-12 animate-pulse">In Post-Production</p>
            <h1 class="text-5xl md:text-8xl font-black font-serif italic mb-12 leading-tight text-white">Something New <br> Is Developing.</h1>
            <p class="text-white/60 text-lg md:text-xl font-light mb-16 max-w-2xl mx-auto leading-relaxed">
                A new documentary vision is currently in the final stages of the edit. Sign up to receive an invitation to the private screening.
            </p>
            
            <!-- Countdown -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 mb-20" id="countdown">
                <div class="bg-surface/40 backdrop-blur-md border border-white/5 p-8 md:p-12 shadow-2xl">
                    <span class="block text-4xl md:text-6xl font-serif text-gold mb-2" id="days">00</span>
                    <span class="font-mono text-[8px] uppercase tracking-[0.3em] opacity-40 text-white/60">Days</span>
                </div>
                <div class="bg-surface/40 backdrop-blur-md border border-white/5 p-8 md:p-12 shadow-2xl">
                    <span class="block text-4xl md:text-6xl font-serif text-gold mb-2" id="hours">00</span>
                    <span class="font-mono text-[8px] uppercase tracking-[0.3em] opacity-40 text-white/60">Hours</span>
                </div>
                <div class="bg-surface/40 backdrop-blur-md border border-white/5 p-8 md:p-12 shadow-2xl">
                    <span class="block text-4xl md:text-6xl font-serif text-gold mb-2" id="minutes">00</span>
                    <span class="font-mono text-[8px] uppercase tracking-[0.3em] opacity-40 text-white/60">Minutes</span>
                </div>
                <div class="bg-surface/40 backdrop-blur-md border border-white/5 p-8 md:p-12 shadow-2xl">
                    <span class="block text-4xl md:text-6xl font-serif text-gold mb-2" id="seconds">00</span>
                    <span class="font-mono text-[8px] uppercase tracking-[0.3em] opacity-40 text-white/60">Seconds</span>
                </div>
            </div>

            <!-- Notify Form -->
            <form class="flex flex-col sm:flex-row gap-4 max-w-md mx-auto mb-20">
                <input type="email" placeholder="Email Address" class="flex-1 bg-white/5 border border-white/10 px-8 py-5 focus:outline-none focus:border-gold transition-all text-white placeholder:text-white/20 font-light translate-y-0 text-center sm:text-left">
                <button class="bg-gold text-dark px-12 py-5 font-black uppercase text-[10px] tracking-[0.3em] hover:bg-white transiton-all duration-500 shadow-xl overflow-hidden group relative">
                    <span class="relative z-10 font-bold">Notify Me</span>
                    <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                </button>
            </form>

            <!-- Social Links for Standalone Page -->
            <div class="flex justify-center gap-8 text-white/20">
                <a href="https://instagram.com/" target="_blank" class="hover:text-gold transition-colors"><i class="fab fa-instagram"></i></a>
                <a href="https://vimeo.com/" target="_blank" class="hover:text-gold transition-colors"><i class="fab fa-vimeo-v"></i></a>
                <a href="https://imdb.com/" target="_blank" class="hover:text-gold transition-colors"><i class="fab fa-imdb"></i></a>
            </div>
        </div>
    </main>


    <!-- Countdown Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Target Date: December 2026
            const targetDate = new Date('2026-12-01T00:00:00').getTime();

            function updateCountdown() {
                const now = new Date().getTime();
                const distance = targetDate - now;

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                if (distance < 0) {
                    document.getElementById('countdown').innerHTML = "<p class='text-gold font-serif text-2xl italic col-span-4'>The Premiere Has Begun.</p>";
                    return;
                }

                document.getElementById('days').innerText = days.toString().padStart(2, '0');
                document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
                document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
            }

            setInterval(updateCountdown, 1000);
            updateCountdown();
        });
    </script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
